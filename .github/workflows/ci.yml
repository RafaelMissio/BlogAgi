name: CI Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    name: Build, Test and Allure Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run tests and generate Allure report
        env:
          CI: "true"
          HEADLESS: "true"
        run: ./gradlew --no-daemon clean test allureReport

      - name: Upload Allure raw results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: |
            allure-results
            build/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: build/reports/allure-report/allureReport
          if-no-files-found: warn
          retention-days: 14

